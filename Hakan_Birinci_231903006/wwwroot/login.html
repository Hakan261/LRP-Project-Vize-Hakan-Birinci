<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LRP - Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .role-selector {
            display: flex;
            margin-bottom: 2rem;
        }
        .role-btn {
            flex: 1;
            padding: 1rem;
            border: 2px solid #dee2e6;
            background: white;
            color: #6c757d;
            border-radius: 0.5rem;
            margin: 0 0.25rem;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
        }
        .role-btn.active {
            border-color: var(--role-color);
            background: var(--role-bg);
            color: var(--role-text);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .role-btn.admin.active {
            --role-color: #0d6efd;
            --role-bg: #e7f3ff;
            --role-text: #0d6efd;
        }
        .role-btn.student.active {
            --role-color: #198754;
            --role-bg: #e8f5e8;
            --role-text: #198754;
        }
        .card-header.admin {
            background: linear-gradient(135deg, #0d6efd, #0056b3);
        }
        .card-header.student {
            background: linear-gradient(135deg, #198754, #146c43);
        }
        .btn-admin {
            background: linear-gradient(135deg, #0d6efd, #0056b3);
            border: none;
        }
        .btn-student {
            background: linear-gradient(135deg, #198754, #146c43);
            border: none;
        }
        .btn-admin:hover {
            background: linear-gradient(135deg, #0056b3, #004085);
        }
        .btn-student:hover {
            background: linear-gradient(135deg, #146c43, #0f5132);
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-header text-center text-white" id="cardHeader">
                        <h3>Laboratuvar Kaynak Planlama</h3>
                        <p class="mb-0" id="roleTitle">Rol Seçin</p>
                    </div>
                    <div class="card-body">
                        <div class="role-selector">
                            <button class="role-btn admin" data-role="admin">
                                <i class="fas fa-cog me-2"></i>Admin Giriş
                            </button>
                            <button class="role-btn student" data-role="student">
                                <i class="fas fa-user-graduate me-2"></i>Öğrenci Giriş
                            </button>
                        </div>
                        <form id="loginForm" class="d-none">
                            <div class="mb-3">
                                <label for="username" class="form-label">Kullanıcı Adı</label>
                                <input type="text" id="username" class="form-control" required />
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Parola</label>
                                <input type="password" id="password" class="form-control" required />
                            </div>
                            <div id="loginError" class="alert alert-danger d-none" role="alert"></div>
                            <button type="submit" class="btn w-100" id="loginBtn">Giriş Yap</button>
                        </form>
                        <div id="roleHint" class="text-center text-muted">
                            <small>Lütfen giriş yapmak istediğiniz rolü seçin</small>
                        </div>
                    </div>
                    <div class="card-footer text-muted text-center">
                        <div id="adminHint">Admin hesap: admin / Admin@123</div>
                        <div id="studentHint" class="d-none">Öğrenci hesap: 231903006(ögrenciNumarası) / 231903006@2026</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const pageOrigin = window.location.protocol === 'file:' ? 'http://localhost:5000' : window.location.origin;
        let selectedRole = null;

        if (window.location.protocol === 'file:') {
            window.location.href = `${pageOrigin}/login.html`;
        }

        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const role = e.currentTarget.dataset.role;
                selectRole(role);
            });
        });

        // Varsayılan olarak admin rolünü seç ve giriş formunu göster
        selectRole('admin');

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-role="${role}"]`).classList.add('active');

            const cardHeader = document.querySelector('#cardHeader');
            const roleTitle = document.querySelector('#roleTitle');
            const loginBtn = document.querySelector('#loginBtn');
            const loginForm = document.querySelector('#loginForm');
            const roleHint = document.querySelector('#roleHint');
            const adminHint = document.querySelector('#adminHint');
            const studentHint = document.querySelector('#studentHint');

            cardHeader.className = `card-header text-center text-white ${role}`;
            loginBtn.className = `btn w-100 btn-${role}`;

            if (role === 'admin') {
                roleTitle.textContent = 'Admin Giriş';
                loginForm.classList.remove('d-none');
                roleHint.classList.add('d-none');
                adminHint.classList.remove('d-none');
                studentHint.classList.add('d-none');
            } else {
                roleTitle.textContent = 'Öğrenci Giriş';
                loginForm.classList.remove('d-none');
                roleHint.classList.add('d-none');
                adminHint.classList.add('d-none');
                studentHint.classList.remove('d-none');
            }
        }

        document.querySelector('#loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            if (!selectedRole) {
                alert('Lütfen bir rol seçin');
                return;
            }

            const username = document.querySelector('#username').value.trim();
            const password = document.querySelector('#password').value.trim();
            const error = document.querySelector('#loginError');

            try {
                const response = await fetch(`${pageOrigin}/api/auth/login`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    error.textContent = 'Kullanıcı adı veya parola hatalı.';
                    error.classList.remove('d-none');
                    return;
                }

                const result = await response.json();
                if (result.role === 'Admin') {
                    window.location.href = `${pageOrigin}/index.html`;
                } else {
                    window.location.href = `${pageOrigin}/student.html`;
                }
            } catch (e) {
                error.textContent = `Sunucuya bağlanılamadı: ${e.message}`;
                error.classList.remove('d-none');
            }
        });

        (async () => {
            try {
                const user = await apiFetch('/api/auth/user');
                if (user.role === 'Admin') {
                    window.location.href = `${pageOrigin}/index.html`;
                } else if (user.role === 'Student') {
                    window.location.href = `${pageOrigin}/student.html`;
                }
            } catch {
                // Not logged in yet.
            }
        })();
    </script>
</body>
</html>
